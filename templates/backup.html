{% extends "base.html" %}
{% block title %}Backup{% endblock %}
{% block content %}

<div class="card">
    <h2>Backup
        <span class="help" data-tip="Downloads a zip of: the SQLite database (all records, schedules, approvals), every JSON snapshot, every log file, settings.json and icn_cookies.json. Use this as a safety copy before migrating or experimenting.">?</span>
    </h2>
    <p class="muted">
        Database: {{ "present" if has_db else "not yet created" }} &middot;
        {{ output_count }} snapshot files &middot; {{ log_count }} log files
    </p>
    <p style="margin-top:12px;"><a class="btn btn-primary" href="{{ url_for('backup_export') }}">Download full backup (.zip)</a></p>
</div>

{% endblock %}
